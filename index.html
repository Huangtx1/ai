<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>与 HwangTaaiyam 对话</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,"Microsoft YaHei",sans-serif;}
body{background:linear-gradient(135deg,#4158D0,#C850C0);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;}
.chat{width:100%;max-width:700px;height:90vh;max-height:750px;background:#fff;border-radius:24px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.header{background:#5145CD;color:#fff;padding:22px;text-align:center;}
.header h1{font-size:24px;font-weight:600;}
.header p{font-size:14px;opacity:.9;margin-top:4px;}
.body{flex:1;padding:24px;overflow-y:auto;background:#f7f8fa;display:flex;flex-direction:column;gap:16px;}
.msg{max-width:78%;padding:12px 16px;border-radius:18px;line-height:1.6;font-size:15px;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.user{align-self:flex-end;background:#5145CD;color:#fff;border-bottom-right-radius:6px;}
.bot{align-self:flex-start;background:#fff;color:#222;border:1px solid #e5e7eb;border-bottom-left-radius:6px;}
.input-area{padding:20px;background:#fff;display:flex;gap:12px;border-top:1px solid #eee;}
#input{flex:1;padding:14px 18px;border:1px solid #d1d5db;border-radius:24px;outline:none;font-size:15px;resize:none;min-height:50px;}
#send{width:50px;height:50px;border-radius:50%;background:#5145CD;color:#fff;border:none;font-size:18px;cursor:pointer;}
.loading{text-align:center;color:#666;padding:10px;}
/* 底部版权样式 */
.footer{text-align:center;padding:12px;font-size:12px;color:#666;background:#fff;border-top:1px solid #eee;}
</style>
</head>
<body>

<div class="chat">
  <div class="header">
    <h1>与 HwangTaaiyam 对话</h1>
    <p>自研大模型 LLM</p>
  </div>
  <div class="body" id="chatBody">
    <div class="msg bot">你好，我是 HwangTaaiyam，有什么想跟我说的？ </div>
  </div>
  <div class="input-area">
    <textarea id="input" placeholder="输入消息…" rows="1"></textarea>
    <button id="send">➤</button>
  </div>
  <!-- 底部版权信息 -->
  <div class="footer">
    版权所有 | 联系方式：hello@nebtap.com
  </div>
</div>

<script>
// ✅ 正确地址（必须匹配路由）
const WORKER_URL = "https://ai.nebtap.com/api/";

const chatBody = document.getElementById("chatBody");
const input = document.getElementById("input");
const send = document.getElementById("send");

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

send.onclick = sendMsg;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";
  input.style.height = "auto";
  send.disabled = true;

  const loading = document.createElement("div");
  loading.className = "loading";
  loading.textContent = "HwangTaaiyam 思考中…";
  chatBody.appendChild(loading);
  chatBody.scrollTop = chatBody.scrollHeight;

  try {
    const res = await fetch(`${WORKER_URL}?t=${Date.now()}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });

    const data = await res.json();
    chatBody.removeChild(loading);

    // ✅ 修复：读取正确的 reply 字段
    let reply = data.reply || data.error || "抱歉，我暂时无法回复";
    addMsg(reply, "bot");
  } catch (e) {
    chatBody.removeChild(loading);
    addMsg(`请求失败：${e.message}`, "bot");
  } finally {
    send.disabled = false;
    chatBody.scrollTop = chatBody.scrollHeight;
  }
}

function addMsg(text, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}
</script>
</body>
</html>
